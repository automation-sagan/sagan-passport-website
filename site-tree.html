const ROW = NODE_H + V_GAP;

let leafCursor = 0;
function layout(node, depth) {
  node.depth = depth;
  node.x = PAD_X + depth * COL_W;
  if (node.children && node.children.length) {
    node.children.forEach(c => layout(c, depth + 1));
    const first = node.children[0], last = node.children[node.children.length - 1];
    node.y = (first.y + last.y) / 2;
  } else {
    node.y = PAD_Y + leafCursor * ROW;
    leafCursor++;
  }
}
layout(TREE, 0);

// Flatten nodes + edges; assign each node its section color (top-level child's
// palette entry, inherited by the whole subtree).
const nodes = [], edges = [];
TREE.color = ROOT_COLOR;
(function walk(n, color) {
  n.color = color;
  nodes.push(n);
  if (n.children) n.children.forEach((c, i) => {
    const childColor = (n === TREE) ? PALETTE[i % PALETTE.length] : color;
    edges.push([n, c]);
    walk(c, childColor);
  });
})(TREE, ROOT_COLOR);

const maxX = Math.max(...nodes.map(n => n.x)) + COL_W;
const maxY = Math.max(...nodes.map(n => n.y)) + NODE_H + PAD_Y;

// ---------------------------------------------------------------------------
// Canvas + view transform.
// ---------------------------------------------------------------------------
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let view = { x: 0, y: 0, scale: 1 };
let dpr = window.devicePixelRatio || 1;

function resize() {
  dpr = window.devicePixelRatio || 1;
  canvas.width = canvas.clientWidth * dpr;
  canvas.height = canvas.clientHeight * dpr;
  draw();
}
window.addEventListener("resize", resize);

function fitView() {
  const vw = canvas.clientWidth, vh = canvas.clientHeight;
  const scale = Math.min(vw / maxX, vh / maxY, 1) * 0.92;
  view.scale = scale;
  view.x = (vw - maxX * scale) / 2 + 20;
  view.y = (vh - maxY * scale) / 2;
  draw();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function nodeWidth(node) {
  ctx.font = (node.type === "root" ? "600 " : "500 ") + "13px -apple-system, system-ui, sans-serif";
  const w = ctx.measureText(node.label).width + 28;
  return Math.min(Math.max(w, 90), COL_W - 40);
}

function curve(x1, y1, x2, y2) {
  const midX = x1 + (x2 - x1) / 2;
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.bezierCurveTo(midX, y1, midX, y2, x2, y2);
  ctx.stroke();
}

function draw() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);
  ctx.save();
  ctx.translate(view.x, view.y);
  ctx.scale(view.scale, view.scale);

  // Tree edges.
  ctx.lineWidth = 1.5;
  ctx.setLineDash([]);
  edges.forEach(([p, c]) => {
    const pw = nodeWidth(p);
    ctx.strokeStyle = c.color.stroke + "66";
    curve(p.x + pw, p.y + NODE_H / 2, c.x, c.y + NODE_H / 2);
  });

  // Nodes.
  nodes.forEach(n => {
    const w = nodeWidth(n);
    const col = n.color;
    ctx.fillStyle = col.fill;
    ctx.strokeStyle = col.stroke;
    ctx.lineWidth = (n.type === "root") ? 2.5 : 1.5;
    roundRect(n.x, n.y, w, NODE_H, 8);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = col.text;
    ctx.font = (n.type === "root" ? "600 " : "500 ") + "13px -apple-system, system-ui, sans-serif";
    ctx.textBaseline = "middle";
    ctx.save();
    roundRect(n.x, n.y, w, NODE_H, 8);
    ctx.clip();
    ctx.fillText(n.label, n.x + 14, n.y + NODE_H / 2 + 0.5);
    ctx.restore();
  });

  ctx.restore();
}

// ---------------------------------------------------------------------------
// Interaction.
// ---------------------------------------------------------------------------
let dragging = false, last = { x: 0, y: 0 };
canvas.addEventListener("mousedown", e => { dragging = true; last = { x: e.clientX, y: e.clientY }; canvas.classList.add("grabbing"); });
window.addEventListener("mousemove", e => {
  if (!dragging) return;
  view.x += e.clientX - last.x; view.y += e.clientY - last.y;
  last = { x: e.clientX, y: e.clientY }; draw();
});
window.addEventListener("mouseup", () => { dragging = false; canvas.classList.remove("grabbing"); });

canvas.addEventListener("wheel", e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  const factor = e.deltaY < 0 ? 1.12 : 1 / 1.12;
  const newScale = Math.min(Math.max(view.scale * factor, 0.15), 3);
  view.x = mx - (mx - view.x) * (newScale / view.scale);
  view.y = my - (my - view.y) * (newScale / view.scale);
  view.scale = newScale; draw();
}, { passive: false });

canvas.addEventListener("dblclick", fitView);

function zoomBy(factor) {
  const cx = canvas.clientWidth / 2, cy = canvas.clientHeight / 2;
  const newScale = Math.min(Math.max(view.scale * factor, 0.15), 3);
  view.x = cx - (cx - view.x) * (newScale / view.scale);
  view.y = cy - (cy - view.y) * (newScale / view.scale);
  view.scale = newScale; draw();
}
document.getElementById("zoomin").onclick = () => zoomBy(1.2);
document.getElementById("zoomout").onclick = () => zoomBy(1 / 1.2);
document.getElementById("reset").onclick = fitView;

// Touch (single-finger pan).
canvas.addEventListener("touchstart", e => { if (e.touches.length === 1) { dragging = true; last = { x: e.touches[0].clientX, y: e.touches[0].clientY }; } }, { passive: true });
canvas.addEventListener("touchmove", e => {
  if (dragging && e.touches.length === 1) {
    view.x += e.touches[0].clientX - last.x; view.y += e.touches[0].clientY - last.y;
    last = { x: e.touches[0].clientX, y: e.touches[0].clientY }; draw();
  }
}, { passive: true });
canvas.addEventListener("touchend", () => { dragging = false; });

resize();
fitView();
</script>
</body>
</html>
